name: Security Audit Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  security-checks:
    name: DevSecOps Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.1.2"
          virtualenvs-in-project: true

      - name: Cache do ambiente virtual
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Instalar dependências
        run: poetry install --no-interaction

      - name: "[ SAST ] Bandit — Análise de vulnerabilidades no código"
        run: poetry run bandit -r main.py -f txt -o bandit-report.txt
        continue-on-error: false

      - name: "[ SCA ] pip-audit — Auditoria de dependências"
        run: poetry run pip-audit
        continue-on-error: false

      - name: "[ LINT ] Ruff — Qualidade e conformidade de código"
        run: poetry run ruff check main.py
        continue-on-error: false

      - name: Upload de relatórios como artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.txt
          retention-days: 90
